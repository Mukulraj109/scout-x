<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scout-X Scrapper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <meta name="theme-color" content="#023345" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Geologica', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0a1620;
        color: #e7ecf1;
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
      }
      #root { width: 100%; min-height: 100vh; }
      @keyframes maxun_spin { to { transform: rotate(360deg); } }
      /* Narrow side panel: thin scrollbar + gutter so content is not covered */
      .scoutx-modal-scroll {
        overflow-y: auto;
        flex: 1 1 auto;
        min-height: 0;
        scrollbar-gutter: stable;
        scrollbar-width: thin;
        scrollbar-color: #475569 #0c1118;
        -webkit-overflow-scrolling: touch;
      }
      .scoutx-modal-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .scoutx-modal-scroll::-webkit-scrollbar-track {
        background: #0c1118;
        border-radius: 999px;
      }
      .scoutx-modal-scroll::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 999px;
      }
    </style>
